<!DOCTYPE html>
<html>
<head>
<title>redline demo</title>
<link rel="stylesheet" href="style.css">
<script type="importmap">
{
  "imports": {
    "essentia.js": "https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia.js-core.es.js",
    "essentia.js/wasm": "https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia-wasm.es.js",
    "wavesurfer.js": "https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js",
    "wavesurfer.js/regions": "https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.esm.js"
  }
}
</script>
<script type="module" src="app.js"></script>
</head>

<body>

<h1>red<span class="red-l">l</span>ine demo</h1>

<input type="file" id="audioFile" accept="audio/*">

<div id="controls">
    <!-- smoothing: moving-average window (beats) that removes jitter;
         keep small to preserve real tempo drift on live recordings -->
    <div class="control">
        <label for="smoothing">Smoothing: <span id="smoothingValue">4</span></label>
        <input type="range" id="smoothing" min="1" max="16" value="4">
    </div>

    <!-- tolerance: collapse near-equal beats into one red line;
         low = faithful to drift, high = treat the song as fixed tempo -->
    <div class="control">
        <label for="tolerance">Tolerance (ms): <span id="toleranceValue">5</span></label>
        <input type="range" id="tolerance" min="0" max="20" value="5">
    </div>

    <button id="calculate">Calculate</button>
    <!-- fix octave errors (e.g. detected 102 for a 204 BPM song) on the
         existing beats without re-running detection -->
    <button id="halveTempo">÷2 tempo</button>
    <button id="doubleTempo">×2 tempo</button>
</div>

<div id="waveform"></div>

<label for="zoom">Zoom</label>
<input type="range" id="zoom" min="1" max="500" value="1">

<button id="play">Play</button>
<button id="pause">Pause</button>

<div id="results">
    No analysis yet.
</div>

<textarea id="osuTimingPoints" rows="10" cols="80"></textarea>

<button id="downloadOsu" style="display:none;">
    Download .osu
</button>

<footer>
    Built with
    <a href="https://mtg.github.io/essentia.js/" target="_blank" rel="noopener">essentia.js</a>
    and
    <a href="https://wavesurfer.xyz/" target="_blank" rel="noopener">wavesurfer.js</a>.
    <br>
    <a href="https://github.com/jxu/redline" target="_blank" rel="noopener">Source on GitHub</a>
</footer>

</body>
</html>
